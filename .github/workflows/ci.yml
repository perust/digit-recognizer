name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m compileall -q web_version desktop_version
